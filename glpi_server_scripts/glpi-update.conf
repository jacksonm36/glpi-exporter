#!/hint/bash
# glpi-update.conf -- Configuration for glpi-update.sh
# Place this file next to glpi-update.sh, or at /etc/glpi-update.conf
# Values here are overridden by CLI arguments.

# ---------------------------------------------------------------------------
# GLPI paths (leave empty to auto-detect)
# ---------------------------------------------------------------------------
GLPI_PATH=""
GLPI_CONFIG_DIR=""        # e.g. /etc/glpi
GLPI_VAR_DIR=""           # e.g. /var/lib/glpi
GLPI_LOG_DIR=""           # e.g. /var/log/glpi

# ---------------------------------------------------------------------------
# Backup
# ---------------------------------------------------------------------------
BACKUP_DIR="/var/backups/glpi"
BACKUP_RETENTION=3        # number of backup sets to keep

# ---------------------------------------------------------------------------
# Timeouts (seconds)
# ---------------------------------------------------------------------------
DOWNLOAD_TIMEOUT=300
DB_UPDATE_TIMEOUT=600

# ---------------------------------------------------------------------------
# Maintenance
# ---------------------------------------------------------------------------
MAINTENANCE_PAGE=""       # optional path to a custom HTML maintenance page

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
LOG_FILE="/var/log/glpi-update.log"

# ---------------------------------------------------------------------------
# GitHub API
# ---------------------------------------------------------------------------
GITHUB_API_URL="https://api.github.com/repos/glpi-project/glpi/releases/latest"
